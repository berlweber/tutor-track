{% extends "base.html" %} {% load static %}
{% block head %}
<link rel="stylesheet" href="{% static "css/assignments/confirm-delete.css" %}">
{% endblock head %}
{% block content %}
<div class="page-header">
  <h1>Delete Assignment?</h1>
</div>
<h2 class='confirm-text'>Are you sure you want to delete Assignment: <strong>"{{ object }}"</strong>?</h2>

<form action="" method="post" class="form">
  {% csrf_token %}
  <a href="{% url 'assignment-detail' assignment.id %}" class="btn secondary"> Cancel </a>
  <button type="submit" class="btn danger">Yes - Delete!</button>
</form>
{% endblock content %}
