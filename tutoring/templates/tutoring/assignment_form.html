{% extends "base.html" %} {% load static %}
{% block head %}
<link rel="stylesheet" href="{% static "css/assignments/assignment-form.css" %}">
{% endblock head %}
{% block content %}
<div class='page-header'>
    {% if assignment %}
    <h1>Edit '{{ assignment }}' assignment</h1>
    {% else %}
    <h1>Create a new Assignment</h1>
    {% endif %}
</div>

<form action="" method="post" class="form-container">
    {% csrf_token %}
    <table>
        {{ form.as_p }}
    </table>
    <button type="submit" class='btn'>Submit</button>
</form>
{% endblock content %}
